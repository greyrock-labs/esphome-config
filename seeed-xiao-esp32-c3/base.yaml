---
substitutions:
  ble_default_profile: "Medium"

esp32:
  variant: esp32c3
  board: seeed_xiao_esp32c3
  framework:
    type: esp-idf

logger:
  level: DEBUG
  baud_rate: 115200
  hardware_uart: USB_CDC

ota:
  - platform: esphome
    password: ${ota_password}
    version: 2

captive_portal:

mdns:

wifi:
  <<: !include ../esphome-common/wifi.yaml
  use_address: ${system_name}.internal.greyrock.io
  power_save_mode: NONE
  enable_on_boot: true
  reboot_timeout: 10min
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret wifi_captive
    ap_timeout: 120s
  on_disconnect:
    then:
      - lambda: |-
          id(_wifi_disconnects_since_boot)++;

esp32_ble_tracker:
  id: ble_tracker
  scan_parameters:
    active: true
    interval: 320ms
    window: 90ms
    continuous: true

# BLE Scan Profile selector: Low, Medium, High
select:
  - platform: template
    name: "BLE Scan Profile"
    id: sel_ble_scan_profile
    optimistic: true
    restore_value: true
    initial_option: "${ble_default_profile}"
    options:
      - "Low"
      - "Medium"
      - "High"
    set_action:
      - lambda: |-
          id(ble_tracker).stop_scan();
          auto opt = id(sel_ble_scan_profile).current_option();
          if (opt == "Low") {
              id(ble_tracker).set_scan_interval(320);
              id(ble_tracker).set_scan_window(30);
          } else if (opt == "Medium") {
              id(ble_tracker).set_scan_interval(320);
              id(ble_tracker).set_scan_window(90);
          } else {
              id(ble_tracker).set_scan_interval(320);
              id(ble_tracker).set_scan_window(160);
          }
          id(ble_tracker).start_scan();

# Text sensors
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP"
      entity_category: diagnostic
    mac_address:
      name: "MAC"
      entity_category: diagnostic
    ssid:
      name: "SSID"
      entity_category: diagnostic
    bssid:
      name: "BSSID"
      entity_category: diagnostic

# Basics + Wi-Fi disconnect count (since boot)
sensor:
  - platform: internal_temperature
    name: "Internal Temp"
    entity_category: diagnostic

  - platform: template
    name: "Wi-Fi Disconnects (since boot)"
    id: wifi_disconnects_since_boot_sensor
    entity_category: diagnostic
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
        return id(_wifi_disconnects_since_boot);

# Globals (since-boot only; not restored)
globals:
  - id: _wifi_disconnects_since_boot
    type: int
    restore_value: no
    initial_value: '0'

packages:
  esphome-base: !include
    file: ../esphome-common/base.yaml
  bluetooth-proxy: !include
    file: ../esphome-common/bluetooth-proxy.yaml
  auto-restart: !include
    file: ../esphome-common/auto-restart.yaml