---
esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  hardware_uart: UART0

ota:
  - platform: esphome
    password: ${ota_password}

wifi:
  <<: !include ../esphome-common/wifi.yaml
  use_address: ${system_name}.internal.greyrock.io
  reboot_timeout: 10min
  ap:
    ssid: "guest-wifi-display"
    password: !secret wifi_captive

captive_portal:

esphome:
  on_boot:
    priority: 600
    then:
      - output.turn_on: bsp_battery_enable

output:
  - platform: gpio
    pin: GPIO21
    id: bsp_battery_enable

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

font:
  - file: "fonts/OpenSans-Bold.ttf"
    id: label_font
    size: 18
  - file: "fonts/OpenSans-Bold.ttf"
    id: value_font
    size: 24
  - file: "fonts/OpenSans-Bold.ttf"
    id: header_font
    size: 22
  - file: "fonts/OpenSans-Bold.ttf"
    id: column_font
    size: 20

# Time from HA (no NTP drift)
time:
  - platform: homeassistant
    id: ha_time

# ── Davis weather data — all from HA, no Prom, no http_request ──
sensor:
  - platform: homeassistant
    id: out_temp
    entity_id: sensor.grey_rock_outside_temperature
  - platform: homeassistant
    id: out_humidity
    entity_id: sensor.grey_rock_outside_humidity
  - platform: homeassistant
    id: dewpoint
    entity_id: sensor.grey_rock_dewpoint
  - platform: homeassistant
    id: pressure
    entity_id: sensor.grey_rock_pressure
  - platform: homeassistant
    id: wind
    entity_id: sensor.grey_rock_wind
  - platform: homeassistant
    id: wind_gust
    entity_id: sensor.grey_rock_wind_gust
  - platform: homeassistant
    id: uv_index
    entity_id: sensor.grey_rock_uv_index
  - platform: homeassistant
    id: solar_irr
    entity_id: sensor.grey_rock_solar_irradiance

  - platform: homeassistant
    id: rain_today
    entity_id: sensor.grey_rock_rain_today
  - platform: homeassistant
    id: rain_month
    entity_id: sensor.grey_rock_rain_this_month
  - platform: homeassistant
    id: rain_year
    entity_id: sensor.grey_rock_rain_this_year
  - platform: homeassistant
    id: rain_storm
    entity_id: sensor.grey_rock_rain_storm
  - platform: homeassistant
    id: rain_intensity
    entity_id: sensor.grey_rock_rain_intensity

  - platform: homeassistant
    id: rm_kitchen
    entity_id: sensor.kitchen_temp_775f_temperature
  - platform: homeassistant
    id: rm_mbr
    entity_id: sensor.mbr_temp_46f8_temperature
  - platform: homeassistant
    id: rm_dining
    entity_id: sensor.dining_room_occupancy_sensor_temperature
  - platform: homeassistant
    id: rm_office
    entity_id: sensor.office_temp_289d_temperature
  - platform: homeassistant
    id: rm_dsbath
    entity_id: sensor.downstairs_bathroom_occupancy_sensor_temperature
  - platform: homeassistant
    id: rm_game
    entity_id: sensor.game_room_occupancy_sensor_temperature
  - platform: homeassistant
    id: rm_living
    entity_id: sensor.fsr_temp_6bd0_temperature
  - platform: homeassistant
    id: rm_breezeway
    entity_id: sensor.breezeway_motion_sensor_temperature

  - platform: homeassistant
    id: batt
    entity_id: sensor.grey_rock_transmitter_battery
  - platform: homeassistant
    id: supercap
    entity_id: sensor.grey_rock_supercapacitor
  - platform: homeassistant
    id: solar_panel_v
    entity_id: sensor.grey_rock_solar_panel

text_sensor:
  - platform: homeassistant
    id: forecast_state
    entity_id: weather.forecast_grey_rock
  - platform: homeassistant
    id: wind_dir
    entity_id: sensor.grey_rock_wind_direction
  - platform: homeassistant
    id: pressure_trend
    entity_id: sensor.grey_rock_pressure_trend
  - platform: homeassistant
    id: davis_updated
    entity_id: sensor.grey_rock_last_updated
  - platform: homeassistant
    id: davis_connected
    entity_id: binary_sensor.grey_rock_connectivity

button:
  - platform: template
    name: "ePaper Full Refresh"
    on_press:
      - component.update: epaper_display
      - delay: 100ms
      - lambda: 'id(epaper_display).update();'

interval:
  - interval: 300s
    then:
      - lambda: 'id(epaper_display).update();'
  - interval: 1800s
    then:
      - component.update: epaper_display
      - delay: 100ms
      - lambda: 'id(epaper_display).update();'

display:
  - platform: waveshare_epaper
    id: epaper_display
    model: 7.50inv2alt
    cs_pin: GPIO10
    dc_pin: GPIO11
    reset_pin:
      number: GPIO12
      inverted: false
    busy_pin:
      number: GPIO13
      inverted: true
    update_interval: never
    lambda: |-
      int w = it.get_width();
      int h = it.get_height();

      auto f_or_q = [](float v, const char* fmt) -> std::string {
        if (isnan(v)) return "?";
        char b[16];
        snprintf(b, sizeof(b), fmt, v);
        return std::string(b);
      };
      auto integer_or_q = [](float v) -> std::string {
        if (isnan(v)) return "?";
        char b[8];
        snprintf(b, sizeof(b), "%.0f", v);
        return std::string(b);
      };

      std::string wx_label = "?";
      if (id(forecast_state).has_state()) {
        std::string s = id(forecast_state).state;
        if      (s == "partlycloudy")        wx_label = "partly cloudy";
        else if (s == "sunny")               wx_label = "sunny";
        else if (s == "clear-night")         wx_label = "clear";
        else if (s == "cloudy")              wx_label = "cloudy";
        else if (s == "rainy")               wx_label = "rain";
        else if (s == "pouring")             wx_label = "heavy rain";
        else if (s == "snowy")               wx_label = "snow";
        else if (s == "windy")               wx_label = "windy";
        else if (s == "fog")                 wx_label = "fog";
        else if (s == "hail")                wx_label = "hail";
        else if (s.rfind("lightning", 0) == 0) wx_label = "storm";
        else                                 wx_label = s;
      }

      it.strftime(274, 8, id(header_font), COLOR_ON, "%a %b %d %I:%M %p", id(ha_time).now());
      it.line(0, 50, w, 50);

      std::string dir = id(wind_dir).has_state() ? id(wind_dir).state : "?";
      for (auto &c : dir) c = toupper(c);
      char hdr[96];
      snprintf(hdr, sizeof(hdr), "Grey Rock  %s  wind %smph %s  UV %s",
               wx_label.c_str(),
               f_or_q(id(wind).state, "%.0f").c_str(),
               dir.c_str(),
               f_or_q(id(uv_index).state, "%.1f").c_str());
      it.printf(10, 56, id(label_font), COLOR_ON, "%s", hdr);
      it.line(0, 82, w, 82);

      int mid = w / 2;
      it.line(mid, 90, mid, 270);

      it.printf(mid - 50, 280, id(value_font), COLOR_ON, "Rooms");
      it.line(mid, 320, mid, 440);

      int lx = 8;
      it.printf(lx, 90, id(value_font), COLOR_ON, "Outside");
      it.printf(lx, 130, id(column_font), COLOR_ON, "%sF  %s%% hum",
                 f_or_q(id(out_temp).state, "%.0f").c_str(),
                 integer_or_q(id(out_humidity).state).c_str());
      it.printf(lx, 165, id(column_font), COLOR_ON, "Dew %sF  UV %s",
                 f_or_q(id(dewpoint).state, "%.0f").c_str(),
                 f_or_q(id(uv_index).state, "%.1f").c_str());
      it.printf(lx, 200, id(column_font), COLOR_ON, "%.2f inHg %s",
                 isnan(id(pressure).state) ? 0.0f : id(pressure).state,
                 id(pressure_trend).has_state() ? id(pressure_trend).state.c_str() : "?");
      it.printf(lx, 235, id(label_font), COLOR_ON, "Solar %s W/m2",
                 integer_or_q(id(solar_irr).state).c_str());

      int rx = mid + 8;
      it.printf(rx, 90, id(value_font), COLOR_ON, "Rain");
      it.printf(rx, 130, id(column_font), COLOR_ON, "today   %.2f\"",
                 isnan(id(rain_today).state) ? 0.0f : id(rain_today).state);
      it.printf(rx, 165, id(column_font), COLOR_ON, "month  %.2f\"",
                 isnan(id(rain_month).state) ? 0.0f : id(rain_month).state);
      it.printf(rx, 200, id(column_font), COLOR_ON, "year   %.2f\"",
                 isnan(id(rain_year).state) ? 0.0f : id(rain_year).state);
      it.printf(rx, 235, id(label_font), COLOR_ON, "storm  %.2f\"  rate %.1f",
                 isnan(id(rain_storm).state) ? 0.0f : id(rain_storm).state,
                 isnan(id(rain_intensity).state) ? 0.0f : id(rain_intensity).state);

      it.line(0, 270, w, 270);

      const int lx_lbl = 8;
      const int rx_lbl = 410;
      const int lx_val = 250;
      const int rx_val = 590;
      it.printf(lx_lbl, 320, id(column_font), COLOR_ON, "%s", "Kitchen");
      it.printf(lx_val, 320, id(column_font), COLOR_ON, "%sF",
                 f_or_q(id(rm_kitchen).state, "%.0f").c_str());
      it.printf(rx_lbl, 320, id(column_font), COLOR_ON, "%s", "Master Bedroom");
      it.printf(rx_val, 320, id(column_font), COLOR_ON, "%sF",
                 f_or_q(id(rm_mbr).state, "%.0f").c_str());
      it.printf(lx_lbl, 350, id(column_font), COLOR_ON, "%s", "Dining Room");
      it.printf(lx_val, 350, id(column_font), COLOR_ON, "%sF",
                 f_or_q(id(rm_dining).state, "%.0f").c_str());
      it.printf(rx_lbl, 350, id(column_font), COLOR_ON, "%s", "Office");
      it.printf(rx_val, 350, id(column_font), COLOR_ON, "%sF",
                 f_or_q(id(rm_office).state, "%.0f").c_str());
      it.printf(lx_lbl, 380, id(column_font), COLOR_ON, "%s", "Downstairs Bathroom");
      it.printf(lx_val, 380, id(column_font), COLOR_ON, "%sF",
                 f_or_q(id(rm_dsbath).state, "%.0f").c_str());
      it.printf(rx_lbl, 380, id(column_font), COLOR_ON, "%s", "Game Room");
      it.printf(rx_val, 380, id(column_font), COLOR_ON, "%sF",
                 f_or_q(id(rm_game).state, "%.0f").c_str());
      it.printf(lx_lbl, 410, id(column_font), COLOR_ON, "%s", "Living Room");
      it.printf(lx_val, 410, id(column_font), COLOR_ON, "%sF",
                 f_or_q(id(rm_living).state, "%.0f").c_str());
      it.printf(rx_lbl, 410, id(column_font), COLOR_ON, "%s", "Breezeway");
      it.printf(rx_val, 410, id(column_font), COLOR_ON, "%sF",
                 f_or_q(id(rm_breezeway).state, "%.0f").c_str());

      it.line(0, 445, w, 445);
      std::string conn = (id(davis_connected).state == "on") ? "UP" : "DOWN";
      std::string age = "?";
      if (id(davis_updated).has_state() && id(davis_updated).state.length() >= 19) {
        age = id(davis_updated).state.substr(11, 5) + " UTC";
      }
      char bot[96];
      snprintf(bot, sizeof(bot), "Weatherlink %s  Battery %sV  Capacitor %sV  Updated %s",
               conn.c_str(),
               f_or_q(id(batt).state, "%.2f").c_str(),
               f_or_q(id(supercap).state, "%.2f").c_str(),
               age.c_str());
      it.printf(10, 455, id(label_font), COLOR_ON, "%s", bot);

packages:
  esphome-base: !include
    file: ../esphome-common/base.yaml
  auto-restart: !include
    file: ../esphome-common/auto-restart.yaml