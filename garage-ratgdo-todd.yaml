---
substitutions:
  name: garage-ratgdo-todd
  friendly_name: garage-ratgdo-todd
packages:
  ratgdo.esphome: github://ratgdo/esphome-ratgdo/v25board_esp8266_d1_mini_lite.yaml@main
esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}
api:
  encryption:
    key: !secret garage_ratgdo_todd_api_key

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  domain: !secret domain_devices

esp8266:
  board: d1_mini
